<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exe_001</title>
</head>
<body>
    <script>
        const numero = Number(prompt("Digite um número:"));
        let NumeroPosterior = numero + 1;
        let NumeroAnterior = numero - 1;
        alert(`O número digitado foi: ${numero}\nO número anterior é: ${NumeroAnterior}\nO número posterior é: ${NumeroPosterior}`);
    </script>
</body>
</html>
